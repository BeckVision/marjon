        - heading "What RD-001 can actually tell you" [level=3] [ref=e85]
        - paragraph [ref=e86]: If you are researching early-token behavior, candles alone are weak evidence. RD-001 gives you the trade-flow layer that supports real signals, filters, and explanations.
