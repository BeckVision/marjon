          - paragraph [ref=e51]: Plain-English Definition
          - heading "The raw transaction layer for U-001" [level=3] [ref=e52]
          - paragraph [ref=e53]: "For each coin, Marjon looks at the Pumpswap pool, collects trade signatures, filters them to the coin's observation window, parses them into canonical buy and sell rows, and stores them as a reference table. In practical terms: it reconstructs the tape for the coin's early life."
          - list [ref=e54]:
            - listitem [ref=e55]:
              - generic [ref=e56]: ›
              - generic [ref=e57]: Individual trades — no candle summarization. Wallet-level participation is preserved.
            - listitem [ref=e58]:
              - generic [ref=e59]: ›
              - generic [ref=e60]: Budget guards prevent oversized free-tier windows from blocking the normal retry queue.
            - listitem [ref=e61]:
              - generic [ref=e62]: ›
              - generic [ref=e63]: Ordinary backlog keeps shrinking while expensive edge cases stay isolated and visible.
        - generic [ref=e64]:
          - paragraph [ref=e65]: Operational Behavior
          - heading "How it behaves when working properly" [level=3] [ref=e66]
          - generic [ref=e67]:
            - generic [ref=e68]:
              - generic [ref=e69]: Source
              - paragraph [ref=e70]: Recent windows use Shyft. Older windows use Helius. The system chooses based on coin age.
            - generic [ref=e71]:
              - generic [ref=e72]: Unit
              - paragraph [ref=e73]: Each RD-001 row is one parsed buy or sell with wallet, size, fee, and timing information.
            - generic [ref=e74]:
              - generic [ref=e75]: Retry
              - paragraph [ref=e76]: Normal historical partial rows keep getting retried and converted into full window coverage.
            - generic [ref=e77]:
              - generic [ref=e78]: Guard
              - paragraph [ref=e79]: Oversized windows are separated out when they exceed the free-tier budget, instead of poisoning the normal retry queue.
            - generic [ref=e80]:
              - generic [ref=e81]: Goal
              - paragraph [ref=e82]: Turn "the coin pumped" into a measurable explanation of how traders behaved during the move.
