        - generic [ref=e101]:
          - heading "Why not just use OHLCV?" [level=4] [ref=e102]
          - paragraph [ref=e103]: Because OHLCV tells you the shape of the move, not the microstructure underneath it. RD-001 is what turns a price move into behavior you can test.
        - generic [ref=e104]:
          - heading "Why are some rows marked partial?" [level=4] [ref=e105]
          - paragraph [ref=e106]: Partial means some data exists but the full observation window is not yet trusted as complete. That is an operational coverage state, not useless data.
        - generic [ref=e107]:
          - heading "Why isolate oversized rows?" [level=4] [ref=e108]
          - paragraph [ref=e109]: On free-tier APIs, a few very busy coins can consume disproportionate budget. The isolated lane keeps normal coverage moving instead of stalling everything.
