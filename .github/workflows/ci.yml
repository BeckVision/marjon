name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marjon_db
          POSTGRES_USER: marjon
          POSTGRES_PASSWORD: marjon_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U marjon -d marjon_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env
        run: cp .env.example .env

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install dependencies
        run: ./.venv/bin/python -m pip install --upgrade pip && ./.venv/bin/python -m pip install -r requirements.txt

      - name: Run doctor
        run: make doctor

      - name: Run tests
        run: make test
