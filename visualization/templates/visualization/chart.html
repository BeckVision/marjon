<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ symbol }} — Marjon Chart</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
        }
        .toolbar .group { display: flex; gap: 4px; }
        .toolbar .sep { width: 1px; height: 24px; background: #2a2a4a; margin: 0 8px; }
        .btn {
            padding: 6px 14px;
            border: 1px solid #2a2a4a;
            background: transparent;
            color: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
        }
        .btn:hover { background: #2a2a4a; }
        .btn.active { background: #0f3460; border-color: #3282b8; color: #fff; }
        .chart-container { width: 100%; }
        .chart-label {
            padding: 4px 16px;
            font-size: 11px;
            color: #888;
            background: #1a1a2e;
            border-top: 1px solid #2a2a4a;
        }
        #price-chart { width: 100%; height: 55vh; }
        #oi-chart { width: 100%; height: 20vh; }
        #funding-chart { width: 100%; height: 15vh; }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50vh;
            color: #888;
            font-size: 16px;
        }
        .stats {
            padding: 8px 16px;
            font-size: 12px;
            color: #666;
            background: #16213e;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="group">
        {% for s in symbols %}
        <a href="/chart/{{ s }}/" class="btn {% if s == symbol %}active{% endif %}">{{ s }}</a>
        {% endfor %}
    </div>
    <div class="sep"></div>
    <div class="group">
        <button class="btn {% if not request.GET.days or request.GET.days == '7' %}active{% endif %}" onclick="setDays(7)">7D</button>
        <button class="btn" onclick="setDays(30)">30D</button>
        <button class="btn" onclick="setDays(90)">90D</button>
        <button class="btn" onclick="setDays(365)">1Y</button>
    </div>
    <div class="sep"></div>
    <span id="status" style="font-size: 12px; color: #888;">Loading...</span>
</div>

<div class="chart-container">
    <div id="price-chart"></div>
    <div class="chart-label">Open Interest (USDT)</div>
    <div id="oi-chart"></div>
    <div class="chart-label">Funding Rate</div>
    <div id="funding-chart"></div>
</div>

<div class="stats" id="stats"></div>

<script>
const SYMBOL = '{{ symbol }}';
let currentDays = 7;

// Chart options
const chartOptions = {
    layout: {
        background: { color: '#1a1a2e' },
        textColor: '#e0e0e0',
    },
    grid: {
        vertLines: { color: '#2a2a4a' },
        horzLines: { color: '#2a2a4a' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2a2a4a' },
    timeScale: {
        borderColor: '#2a2a4a',
        timeVisible: true,
        secondsVisible: false,
    },
};

// Create charts
const priceChart = LightweightCharts.createChart(
    document.getElementById('price-chart'), chartOptions
);
const oiChart = LightweightCharts.createChart(
    document.getElementById('oi-chart'), {
        ...chartOptions,
        timeScale: { ...chartOptions.timeScale, visible: false },
    }
);
const fundingChart = LightweightCharts.createChart(
    document.getElementById('funding-chart'), chartOptions
);

// Series
const candleSeries = priceChart.addCandlestickSeries({
    upColor: '#26a69a',
    downColor: '#ef5350',
    borderDownColor: '#ef5350',
    borderUpColor: '#26a69a',
    wickDownColor: '#ef5350',
    wickUpColor: '#26a69a',
});
const volumeSeries = priceChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
});
priceChart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
});

const oiSeries = oiChart.addLineSeries({
    color: '#3282b8',
    lineWidth: 1.5,
    priceFormat: { type: 'custom', formatter: (v) => (v / 1e9).toFixed(2) + 'B' },
});

const fundingSeries = fundingChart.addHistogramSeries({
    priceFormat: { type: 'custom', formatter: (v) => (v * 100).toFixed(4) + '%' },
});

// Sync time scales
function syncCharts(source, targets) {
    source.timeScale().subscribeVisibleLogicalRangeChange((range) => {
        if (range) {
            targets.forEach(t => t.timeScale().setVisibleLogicalRange(range));
        }
    });
}
syncCharts(priceChart, [oiChart, fundingChart]);
syncCharts(oiChart, [priceChart, fundingChart]);
syncCharts(fundingChart, [priceChart, oiChart]);

// Fetch and render
async function loadData(days) {
    currentDays = days;
    const status = document.getElementById('status');
    status.textContent = 'Loading...';

    const params = `?days=${days}`;

    try {
        const [klinesRes, metricsRes, fundingRes] = await Promise.all([
            fetch(`/api/chart/klines/${SYMBOL}/${params}`).then(r => r.json()),
            fetch(`/api/chart/metrics/${SYMBOL}/${params}`).then(r => r.json()),
            fetch(`/api/chart/funding/${SYMBOL}/${params}`).then(r => r.json()),
        ]);

        candleSeries.setData(klinesRes.candles);
        volumeSeries.setData(klinesRes.volume);
        oiSeries.setData(metricsRes.open_interest);
        fundingSeries.setData(fundingRes.funding);

        priceChart.timeScale().fitContent();
        oiChart.timeScale().fitContent();
        fundingChart.timeScale().fitContent();

        status.textContent = `${SYMBOL}`;
        document.getElementById('stats').textContent =
            `Candles: ${klinesRes.count.toLocaleString()} | ` +
            `OI points: ${metricsRes.count.toLocaleString()} | ` +
            `Funding: ${fundingRes.count.toLocaleString()}`;

    } catch (err) {
        status.textContent = `Error: ${err.message}`;
        console.error(err);
    }
}

function setDays(days) {
    document.querySelectorAll('.toolbar .group:nth-child(3) .btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    loadData(days);
}

// Resize handler
function handleResize() {
    const w = document.body.clientWidth;
    priceChart.applyOptions({ width: w });
    oiChart.applyOptions({ width: w });
    fundingChart.applyOptions({ width: w });
}
window.addEventListener('resize', handleResize);

// Initial load
loadData(currentDays);
</script>

</body>
</html>
