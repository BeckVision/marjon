{% extends "visualization/_base.html" %}

{% block title %}{{ symbol }} — Marjon Chart{% endblock %}

{% block head_extra %}
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
    /* ── Chart Page Layout ─────────────────────────────────────── */
    /* Override page padding so charts reach the edges cleanly */
    .page { padding-top: 0; padding-bottom: 0; padding-left: 0; padding-right: 0; max-width: 100%; }

    /* ── Toolbar ───────────────────────────────────────────────── */
    .chart-toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
    }

    .toolbar-group {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
    }

    .toolbar-sep {
        width: 1px;
        height: 22px;
        background: var(--border);
        margin: 0 6px;
        align-self: center;
        flex-shrink: 0;
    }

    .toolbar-sym {
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--font-mono);
        text-decoration: none;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
    }

    .toolbar-sym:hover {
        background: var(--bg-secondary);
        color: var(--text-primary);
    }

    .toolbar-sym.active {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: rgba(59, 130, 246, 0.3);
    }

    .toolbar-range {
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-secondary);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--font-body);
        transition: all 0.15s;
    }

    .toolbar-range:hover {
        background: var(--bg-secondary);
        color: var(--text-primary);
    }

    .toolbar-range.active {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: rgba(59, 130, 246, 0.3);
    }

    .toolbar-status {
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        margin-left: auto;
    }

    /* ── Chart Container ───────────────────────────────────────── */
    .chart-wrap {
        width: 100%;
        background: var(--bg-deepest);
    }

    .chart-label {
        padding: 5px 20px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        background: var(--bg-primary);
        border-top: 1px solid var(--border);
    }

    #price-chart  { width: 100%; height: 55vh; }
    #oi-chart     { width: 100%; height: 20vh; }
    #funding-chart{ width: 100%; height: 16vh; }

    /* ── Stats Bar ─────────────────────────────────────────────── */
    .chart-stats {
        padding: 7px 20px;
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        background: var(--bg-primary);
        border-top: 1px solid var(--border);
    }
</style>
{% endblock %}

{% block content %}
<!-- ── Toolbar ─────────────────────────────────────────────────── -->
<div class="chart-toolbar">
    <div class="toolbar-group">
        {% for s in symbols %}
        <a href="/chart/{{ s }}/" class="toolbar-sym {% if s == symbol %}active{% endif %}">{{ s }}</a>
        {% endfor %}
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
        <button class="toolbar-range {% if not request.GET.days or request.GET.days == '7' %}active{% endif %}" onclick="setDays(7, this)">7D</button>
        <button class="toolbar-range" onclick="setDays(30, this)">30D</button>
        <button class="toolbar-range" onclick="setDays(90, this)">90D</button>
        <button class="toolbar-range" onclick="setDays(365, this)">1Y</button>
    </div>
    <span class="toolbar-status" id="status">Loading...</span>
</div>

<!-- ── Charts ──────────────────────────────────────────────────── -->
<div class="chart-wrap">
    <div id="price-chart"></div>
    <div class="chart-label">Open Interest (USDT)</div>
    <div id="oi-chart"></div>
    <div class="chart-label">Funding Rate</div>
    <div id="funding-chart"></div>
</div>

<div class="chart-stats" id="stats"></div>

<script>
const SYMBOL = '{{ symbol }}';
let currentDays = 7;

// ── Design system colours ──────────────────────────────────────
const C_BG         = '#090d13';
const C_BG_PANEL   = '#0f1419';
const C_GRID       = 'rgba(255,255,255,0.04)';
const C_TEXT       = '#8b9db5';
const C_UP         = '#10b981';   // var(--green)
const C_DOWN       = '#ef4444';   // var(--red)
const C_OI_LINE    = '#3b82f6';   // var(--accent)

// ── Shared chart options ───────────────────────────────────────
const sharedOptions = {
    layout: {
        background: { color: C_BG },
        textColor: C_TEXT,
    },
    grid: {
        vertLines: { color: C_GRID },
        horzLines: { color: C_GRID },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: C_GRID },
    timeScale: {
        borderColor: C_GRID,
        timeVisible: true,
        secondsVisible: false,
    },
};

// ── Create charts ──────────────────────────────────────────────
const priceChart = LightweightCharts.createChart(
    document.getElementById('price-chart'), sharedOptions
);

const oiChart = LightweightCharts.createChart(
    document.getElementById('oi-chart'), {
        ...sharedOptions,
        timeScale: { ...sharedOptions.timeScale, visible: false },
    }
);

const fundingChart = LightweightCharts.createChart(
    document.getElementById('funding-chart'), sharedOptions
);

// ── Series ─────────────────────────────────────────────────────
const candleSeries = priceChart.addCandlestickSeries({
    upColor:        C_UP,
    downColor:      C_DOWN,
    borderUpColor:  C_UP,
    borderDownColor:C_DOWN,
    wickUpColor:    C_UP,
    wickDownColor:  C_DOWN,
});

const volumeSeries = priceChart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'volume',
});
priceChart.priceScale('volume').applyOptions({
    scaleMargins: { top: 0.8, bottom: 0 },
});

const oiSeries = oiChart.addLineSeries({
    color: C_OI_LINE,
    lineWidth: 1.5,
    priceFormat: { type: 'custom', formatter: (v) => (v / 1e9).toFixed(2) + 'B' },
});

const fundingSeries = fundingChart.addHistogramSeries({
    priceFormat: { type: 'custom', formatter: (v) => (v * 100).toFixed(4) + '%' },
});

// ── Sync time scales ───────────────────────────────────────────
function syncCharts(source, targets) {
    source.timeScale().subscribeVisibleLogicalRangeChange((range) => {
        if (range) {
            targets.forEach(t => t.timeScale().setVisibleLogicalRange(range));
        }
    });
}
syncCharts(priceChart,   [oiChart, fundingChart]);
syncCharts(oiChart,      [priceChart, fundingChart]);
syncCharts(fundingChart, [priceChart, oiChart]);

// ── Fetch and render ───────────────────────────────────────────
async function loadData(days) {
    currentDays = days;
    const status = document.getElementById('status');
    status.textContent = 'Loading...';

    const params = `?days=${days}`;

    try {
        const [klinesRes, metricsRes, fundingRes] = await Promise.all([
            fetch(`/api/chart/klines/${SYMBOL}/${params}`).then(r => r.json()),
            fetch(`/api/chart/metrics/${SYMBOL}/${params}`).then(r => r.json()),
            fetch(`/api/chart/funding/${SYMBOL}/${params}`).then(r => r.json()),
        ]);

        candleSeries.setData(klinesRes.candles);
        volumeSeries.setData(klinesRes.volume);
        oiSeries.setData(metricsRes.open_interest);
        fundingSeries.setData(fundingRes.funding);

        priceChart.timeScale().fitContent();
        oiChart.timeScale().fitContent();
        fundingChart.timeScale().fitContent();

        status.textContent = SYMBOL;
        document.getElementById('stats').textContent =
            `Candles: ${klinesRes.count.toLocaleString()}  |  ` +
            `OI points: ${metricsRes.count.toLocaleString()}  |  ` +
            `Funding: ${fundingRes.count.toLocaleString()}`;

    } catch (err) {
        status.textContent = `Error: ${err.message}`;
        console.error(err);
    }
}

function setDays(days, btn) {
    document.querySelectorAll('.toolbar-range').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(days);
}

// ── Resize handler ─────────────────────────────────────────────
function handleResize() {
    const w = document.body.clientWidth;
    priceChart.applyOptions({ width: w });
    oiChart.applyOptions({ width: w });
    fundingChart.applyOptions({ width: w });
}
window.addEventListener('resize', handleResize);

// ── Initial load ───────────────────────────────────────────────
loadData(currentDays);
</script>
{% endblock %}
